set -g mouse on
set-window-option -g mode-keys vi
# pane 移動: prefix + hjkl
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# window 移動: prefix + H / L
bind C-h previous-window
bind C-l next-window

bind -r M-h resize-pane -L 5
bind -r M-j resize-pane -D 5
bind -r M-k resize-pane -U 5
bind -r M-l resize-pane -R 5
bind - split-window -v -c "#{pane_current_path}"    # 上下に分割
bind | split-window -h -c "#{pane_current_path}"    # 左右に分割

##### Status line #####

# ステータスラインを有効化
set -g status on

# 下に表示
set -g status-position bottom

# prefix / copy / sync の状態を見やすくするため短めに更新
set -g status-interval 1

# 長さ
set -g status-left-length 100
set -g status-right-length 120

# 全体の色
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"

# 左側: 固定幅の状態バッジ + セッション名 + ホスト名
set -g status-left "#{?client_prefix,#[fg=#1e1e2e]#[bg=#f9e2af]#[bold] PFX #[fg=#f9e2af]#[bg=#1e1e2e] ,#{?pane_in_mode,#[fg=#1e1e2e]#[bg=#a6e3a1]#[bold] CPY #[fg=#a6e3a1]#[bg=#1e1e2e] ,#{?pane_synchronized,#[fg=#1e1e2e]#[bg=#f38ba8]#[bold] SYN #[fg=#f38ba8]#[bg=#1e1e2e] ,#[fg=#cdd6f4]#[bg=#45475a]#[bold] NRM #[fg=#45475a]#[bg=#1e1e2e] }}}#[fg=#1e1e2e,bg=#89b4fa,bold] #S #[fg=#89b4fa,bg=#313244]#[fg=#cdd6f4,bg=#313244] #H #[fg=#313244,bg=#1e1e2e] "

# 右側: 現在のパス + 日時
set -g status-right "#[fg=#45475a]│ #[fg=#a6e3a1]#{pane_current_path} #[fg=#45475a]│ #[fg=#f9e2af]%Y-%m-%d %H:%M "

# ウィンドウ一覧の区切り
set -g window-status-separator ""

# bell 時もタブの形は崩さず、タブ全体を通知色にする
setw -g window-status-bell-style none

# 非アクティブウィンドウ
setw -g window-status-format "#{?window_bell_flag,#[fg=#f9e2af],#[fg=#313244]}#[bg=#1e1e2e]#{?window_bell_flag,#[fg=#1e1e2e]#[bg=#f9e2af]#[bold] 󰂞 ,#[fg=#cdd6f4]#[bg=#313244] }#I:#W#F #{?window_bell_flag,#[fg=#f9e2af],#[fg=#313244]}#[bg=#1e1e2e]"

# アクティブウィンドウ
setw -g window-status-current-format "#{?window_bell_flag,#[fg=#fab387],#[fg=#f38ba8]}#[bg=#1e1e2e]#{?window_bell_flag,#[fg=#1e1e2e]#[bg=#fab387]#[bold] 󰂞 ,#[fg=#1e1e2e]#[bg=#f38ba8]#[bold] }#I:#W#F #{?window_bell_flag,#[fg=#fab387],#[fg=#f38ba8]}#[bg=#1e1e2e]"

# ウィンドウ一覧の位置
set -g status-justify left

# ペイン境界線も合わせておくと見やすい
set -g pane-border-style "fg=#6c7086"
set -g pane-active-border-style "fg=#00ff87,bold"

# メッセージ表示
set -g message-style "bg=#89b4fa,fg=#1e1e2e,bold"

# コピーモードなど
set -g mode-style "bg=#313244,fg=#cdd6f4,bold"

## pane ボーダーステータス
set -g pane-border-status top
set -g pane-border-format "#{?pane_active,#[fg=#1e1e2e#,bg=#00ff87#,bold] #{pane_index}: #[fg=#00ff87#,bg=#313244#,nobold]#[fg=#cdd6f4#,bg=#313244] #{pane_title} #[fg=#313244#,bg=default],#[fg=#89b4fa#,bg=default] #{pane_index}: #[fg=#a6adc8]#{pane_title} }"
